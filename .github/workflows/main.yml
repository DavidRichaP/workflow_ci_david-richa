name: dicoding sistem ML pipeline CI

on: 
  push:
    branches: ["main"]

jobs:
  development-checks:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    
    steps:
      # 1. Kloning kode repositori ke dalam virtual machine runner
      - name: clone repository code
        uses: actions/checkout@v4

      # 2. Inisialisasi Miniconda environment
      - name: miniconda setup
        uses: conda-incubator/setup-miniconda@v3
        with: 
          auto-activate-base: true
          python-version: "3.12.7"

      # 3. Instalasi MLflow CLI eksternal dengan versi spesifik
      - name: install mlflow cli
        shell: bash -el {0}
        run: |
          pip install mlflow==2.19.0

      # 4. Menjalankan Project MLflow (Training & Tuning)
      - name: run MLflow Project
        shell: bash -el {0}
        env: 
          MLFLOW_ALLOW_FILE_STORE: "true"
          MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/workflow-ci/mlproject/mlruns"
        run: |
          cd workflow-ci/mlproject
          
          # Membersihkan sisa data eksekusi lokal sebelumnya agar bersih
          rm -rf mlruns .mlflow mlflow.db
          
          # Eksekusi siklus MLflow run
          mlflow run . --env-manager=conda -P df_path="gender_classif_v7_preprocessed.csv"
      
      # 5. Menyimpan riwayat eksperimen (mlruns) kembali ke repositori Git utama
      - name: save mlruns to repo
        run: |
          git config --global user.name "${{ secrets.username }}"
          git config --global user.email "${{ secrets.email }}"
          
          git add workflow-ci/mlproject/mlruns/
          if ! git diff --cached --quiet; then
            git commit -m "save mlruns from CI run [skip ci]"
            git push origin main
          else
            echo "no new mlflow tracking changes detected. skipping commit"
          fi

      # 6. Mengunggah pelacakan metrik ke GitHub Artifacts
      - name: Upload MLflow artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-tracking-data
          path: workflow-ci/mlproject/mlruns/

      # 7. Autentikasi kredensial ke Docker Hub Registry
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 8. Hasilkan Dockerfile, Bersihkan Baris Python Secara Total, Jalankan Docker CLI
      - name: Build Docker Image via Patched Ubuntu 20.04 Dockerfile
        shell: bash -el {0}
        run: |
          cd workflow-ci/mlproject
          
          # Mencari run ID eksperimen terbaru secara dinamis
          LATEST_RUN=$(ls -t mlruns/0 | grep -v "meta.yaml" | head -n 1)
          MODEL_URI="runs:/$LATEST_RUN/model"
          
          echo "Generating Dockerfile structure from model tracking URI: $MODEL_URI"
          
          mlflow models generate-dockerfile \
            -m "$MODEL_URI" \
            -d "output_docker" \
            --env-manager=virtualenv

          echo "Modifying Dockerfile to natively support Python 3.12 on Ubuntu 20.04..."
          
          # 1. Pastikan OS tetap Ubuntu 20.04 asli sesuai keinginan Anda
          sed -i 's|FROM ubuntu:20.04|FROM ubuntu:20.04|g' output_docker/Dockerfile
          
          # 2. Sisipkan perintah 'apt-get update' awal agar index package Ubuntu segar
          sed -i 's|RUN apt-get install|RUN apt-get update \&\& apt-get install|g' output_docker/Dockerfile
          
          # 3. FIX MUTLAK: Hapus baris 16, 17, 18, dan 19 secara paksa (Blok python3.9 + get-pip yang rusak)
          sed -i '16,19d' output_docker/Dockerfile
          
          # 4. Sisipkan baris instalasi Python 3.12 Deadsnakes PPA yang benar tepat di baris ke-16
          sed -i '16i RUN apt-get install -y software-properties-common \&\& add-apt-repository -y ppa:deadsnakes/ppa \&\& apt-get update \&\& apt-get install -y python3.12 python3.12-dev python3.12-distutils python3-pip python3.12-venv \&\& ln -s -f /usr/bin/python3.12 /usr/bin/python' output_docker/Dockerfile

          echo "Reviewing the patched Dockerfile structure:"
          cat output_docker/Dockerfile | head -n 25

          echo "Compiling the Ubuntu 20.04 image directly using standard Docker CLI..."
          cd output_docker
          docker build -t "${{ secrets.DOCKERHUB_USERNAME }}/dicoding-ml-pipeline:latest" .
      # 9. Mengirimkan image yang berhasil dibuat ke Docker Hub repositori remote
      - name: Push Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/dicoding-ml-pipeline:latest
name: dicoding sistem ML pipeline CI

on: 
  push:
    branches: ["main"]

jobs:
  development-checks:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    
    steps:
      # 1. Kloning kode repositori ke dalam virtual machine runner
      - name: clone repository code
        uses: actions/checkout@v4

      # 2. Inisialisasi Miniconda environment
      - name: miniconda setup
        uses: conda-incubator/setup-miniconda@v3
        with: 
          auto-activate-base: true
          python-version: "3.12.7"

      # 3. Instalasi MLflow CLI eksternal dengan versi spesifik
      - name: install mlflow cli
        shell: bash -el {0}
        run: |
          pip install mlflow==2.19.0

      # 4. Menjalankan Project MLflow (Training & Tuning)
      - name: run MLflow Project
        shell: bash -el {0}
        env: 
          MLFLOW_ALLOW_FILE_STORE: "true"
          MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/workflow-ci/mlproject/mlruns"
        run: |
          cd workflow-ci/mlproject
          
          # Membersihkan sisa data eksekusi lokal sebelumnya agar bersih
          rm -rf mlruns .mlflow mlflow.db
          
          # Eksekusi siklus MLflow run
          mlflow run . --env-manager=conda -P df_path="gender_classif_v7_preprocessed.csv"
      
      # 5. Menyimpan riwayat eksperimen (mlruns) kembali ke repositori Git utama
      - name: save mlruns to repo
        run: |
          git config --global user.name "${{ secrets.username }}"
          git config --global user.email "${{ secrets.email }}"
          
          git add workflow-ci/mlproject/mlruns/
          if ! git diff --cached --quiet; then
            git commit -m "save mlruns from CI run [skip ci]"
            git push origin main
          else
            echo "no new mlflow tracking changes detected. skipping commit"
          fi

      # 6. Mengunggah pelacakan metrik ke GitHub Artifacts
      - name: Upload MLflow artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-tracking-data
          path: workflow-ci/mlproject/mlruns/

      # 7. Autentikasi kredensial ke Docker Hub Registry
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 8. Hasilkan Dockerfile, Bersihkan Baris Python Secara Total, Jalankan Docker CLI
      # 8. Hasilkan Artifact Model, Pasang Tools Kompilasi, dan Bangun via Docker CLI
      - name: Build Custom Production Docker Image
        shell: bash -el {0}
        run: |
          cd workflow-ci/mlproject
          
          LATEST_RUN=$(ls -t mlruns/0 | grep -v "meta.yaml" | head -n 1)
          MODEL_URI="runs:/$LATEST_RUN/model"
          
          mlflow models generate-dockerfile \
            -m "$MODEL_URI" \
            -d "output_docker" \
            --env-manager=virtualenv

          # DEBUG: Intip isi requirements.txt bawaan model agar Anda tahu persis apa saja yang akan diinstall pip
          echo "=== MODEL REQUIREMENTS.TXT DETECTED ==="
          cat output_docker/model_dir/requirements.txt
          echo "======================================="

          echo "Overwriting MLflow's template with custom Python 3.12.7-slim Dockerfile..."

          cat <<-'EOF' > output_docker/Dockerfile
          # Build an image that can serve mlflow models.
          FROM python:3.12.7-slim

          # FIX 1: Pasang gcc dan build-essential karena python-slim tidak memiliki compiler C/C++ bawaan
          RUN apt-get -y update && apt-get install -y --no-install-recommends \
              nginx \
              build-essential \
              gcc \
              && rm -rf /var/lib/apt/lists/*

          WORKDIR /opt/mlflow

          RUN pip install --no-cache-dir mlflow==2.19.0 gevent gunicorn

          COPY model_dir/ /opt/ml/model

          # FIX 2: Jalankan instalasi dependensi model. Jika gagal, error asli pip akan dicetak jelas di console log.
          RUN python -c "from mlflow.models import container as C; C._install_pyfunc_deps('/opt/ml/model', install_mlflow=False, enable_mlserver=False, env_manager='local');"

          ENV MLFLOW_DISABLE_ENV_CREATION=True
          ENV ENABLE_MLSERVER=False
          ENV GUNICORN_CMD_ARGS="--timeout 60 -k gevent"

          RUN chmod -R o+rwX /opt/mlflow/ /opt/ml/model

          ENTRYPOINT ["python", "-c", "from mlflow.models import container as C; C._serve('local')"]
          EOF

          echo "Compiling your custom high-performance production image..."
          cd output_docker
          docker build -t "${{ secrets.DOCKERHUB_USERNAME }}/dicoding-ml-pipeline:latest" .
          
      # 9. Mengirimkan image yang berhasil dibuat ke Docker Hub repositori remote
      - name: Push Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/dicoding-ml-pipeline:latest
global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'mlflow_metrics'
    static_configs:
      # Use 'host.docker.internal:8080' (Method 1) or 'host.docker.internal:8000' (Method 2) 
      # so the Docker container can talk to your local machine apps.
      - targets: ['host.docker.internal:8000']
